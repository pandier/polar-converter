name: build

permissions:
  contents: read

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v4
      - name: build
        run: ./gradlew build
      - uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: build/libs
